<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; }
        .container { max-width: 600px; margin: 30px auto; background: white; padding: 30px; border-radius: 8px; }
        .header { background: #f44336; color: white; padding: 20px; text-align: center; border-radius: 8px 8px 0 0; }
        .content { padding: 20px 0; }
        .footer { text-align: center; color: #888; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>❌ Thanh toán thất bại</h2>
    </div>
    <div class="content">
        <p>Xin chào <strong th:text="${userEmail}"></strong>,</p>
        <p>Rất tiếc, đơn hàng của bạn đã bị từ chối thanh toán.</p>
        <p><strong>Mã đơn hàng:</strong> <span th:text="${orderId}"></span></p>
        <p><strong>Lý do:</strong> <span th:text="${reason}"></span></p>
        <p>Vui lòng thử lại hoặc liên hệ hỗ trợ.</p>
    </div>
    <div class="footer">
        <p>Cảm ơn bạn đã mua hàng tại hệ thống của chúng tôi!</p>
    </div>
</div>
</body>
</html>
