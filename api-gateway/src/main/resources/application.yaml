server:
  port: 8080

spring:
  application:
    name: API-GATEWAY
  cloud:
    gateway:
      server:
        webflux:
          # FIX: prefix mới bắt buộc từ Spring Cloud 2025.0.x
          trusted-proxies: "10\\.0\\.0\\..*"  # chỉnh lại theo dải IP của bạn
          routes:
            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/auth/**

            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/users/**
              filters:
                - AuthFilter

            - id: product-service
              uri: lb://PRODUCT-SERVICE
              predicates:
                - Path=/api/products/**
              filters:
                - AuthFilter

            - id: order-service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/api/orders/**
              filters:
                - AuthFilter

            - id: payment-service
              uri: lb://PAYMENT-SERVICE
              predicates:
                - Path=/api/payments/**
              filters:
                - AuthFilter

            - id: notification-service
              uri: lb://NOTIFICATION-SERVICE
              predicates:
                - Path=/api/notifications/**
              filters:
                - AuthFilter

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# FIX: KHÔNG đặt secret ở đây — dùng biến môi trường
# Trong production: JWT_SECRET=<chuỗi base64 ngẫu nhiên 64+ ký tự>
jwt:
  public-key: classpath:keys/public.pem